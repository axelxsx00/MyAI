<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat IA</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#212121;
    font-family:Arial,sans-serif;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.chat{
    width:800px;
    height:90vh;
    background:#2b2b2b;
    border-radius:15px;
    display:flex;
    flex-direction:column;
}

#mensajes{
    flex:1;
    overflow-y:auto;
    padding:20px;
}

.msg{
    max-width:80%;
    padding:15px;
    margin:10px 0;
    border-radius:15px;
    word-wrap:break-word;
}

.user{
    background:#0b57d0;
    margin-left:auto;
}

.ai{
    background:#444;
}

.barra{
    display:flex;
    padding:20px;
}

input{
    flex:1;
    padding:15px;
    border:none;
    border-radius:15px;
    outline:none;
    font-size:16px;
}

button{
    margin-left:10px;
    padding:15px 25px;
    border:none;
    border-radius:15px;
    background:#0b57d0;
    color:white;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="chat">
    <div id="mensajes"></div>

    <div class="barra">
        <input
            type="text"
            id="entrada"
            placeholder="Escribe un mensaje..."
        >
        <button onclick="enviar()">Enviar</button>
    </div>
</div>

<script>
const API_KEY = "AQ.Ab8RN6Ih9N0qfRwD-UA4mgOMrFLzoG9V1RyHs84RNCjtQ4WMUw";

// Historial del chat
let historial = [];

const mensajes = document.getElementById("mensajes");
const entrada = document.getElementById("entrada");

entrada.addEventListener("keydown", e => {
    if(e.key === "Enter"){
        enviar();
    }
});

function agregarMensaje(texto, clase){

    mensajes.innerHTML += `
        <div class="msg ${clase}">
            ${texto}
        </div>
    `;

    mensajes.scrollTop = mensajes.scrollHeight;
}

async function enviar(){

    const texto = entrada.value.trim();

    if(!texto) return;

    agregarMensaje(texto,"user");

    entrada.value = "";

    historial.push({
        role: "user",
        parts: [
            {
                text: texto
            }
        ]
    });

    try{

        const respuesta = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`,
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    contents: historial
                })
            }
        );

        const datos = await respuesta.json();

        console.log(datos);

        if(datos.error){
            agregarMensaje(
                "Error: " + datos.error.message,
                "ai"
            );
            return;
        }

        const respuestaIA =
            datos.candidates[0].content.parts[0].text;

        historial.push({
            role: "model",
            parts: [
                {
                    text: respuestaIA
                }
            ]
        });

        agregarMensaje(respuestaIA,"ai");

    }catch(error){

        console.error(error);

        agregarMensaje(
            "No se pudo conectar con Gemini.",
            "ai"
        );
    }
}
</script>

</body>
</html>
